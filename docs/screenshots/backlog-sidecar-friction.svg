<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">Backlog sidecar with friction capture enabled</title>
  <desc id="desc">A dark backlog sidecar window showing active sessions, manual backlog items, an auto-detected friction item, and the Friction ON toolbar toggle.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

