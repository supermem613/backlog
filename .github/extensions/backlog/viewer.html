<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Backlog</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  :root {
    --bg:           #0e0f12;
    --bg-elev:      #16181d;
    --bg-rail:      #131419;
    --bg-card:      #1a1c21;
    --bg-card-hov:  #20232a;
    --bg-input:     #0b0c0f;
    --bg-top:       #1c2433;
    --bg-top-hov:   #232d40;
    --bg-chip:      #1a1c21;
    --bg-chip-hov:  #232631;
    --bg-chip-act:  #2a3a55;
    --border:       #262932;
    --border-soft:  #2e323c;
    --border-top:   #3b6fb3;
    --text:         #e8eaef;
    --text-soft:    #b8bcc6;
    --muted:        #7c818d;
    --accent:       #6ea8fe;
    --success:      #4ade80;
    --warn:         #f5b142;
    --dead:         #5a5d66;
    --danger:       #f87171;
    --danger-soft:  #3a1d1d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Text",
                 system-ui, sans-serif;
    font-size: 13px; line-height: 1.45;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* ---------- Layout ---------- */
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: 42px 1fr;
    height: 100vh;
  }
  .topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
  }
  .topbar .title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
  }
  .topbar .status {
    font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .topbar .status .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); margin-right: 6px; vertical-align: middle;
  }
  .topbar .status.live .dot { background: var(--success); }
  .topbar .status.bad .dot  { background: var(--danger); }
  .topbar .runtime {
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .topbar .right {
    display: flex; align-items: center; gap: 10px;
  }
  .topbar .refresh {
    background: transparent; border: 1px solid var(--border-soft);
    color: var(--text-soft); border-radius: 4px;
    padding: 3px 8px; font-size: 11px; line-height: 1;
    transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
  }
  .topbar .refresh:hover { background: #2a2d34; color: var(--text); border-color: var(--accent); }
  .topbar .burndown {
    background: transparent; border: 1px solid var(--border-soft);
    color: var(--text-soft); border-radius: 4px;
    padding: 3px 9px; font-size: 11px; line-height: 1;
    display: inline-flex; align-items: center; gap: 5px;
    font-variant-numeric: tabular-nums;
    transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
  }
  .topbar .burndown:hover { background: #2a2d34; color: var(--text); border-color: var(--accent); }
  .topbar .burndown.on {
    background: var(--accent); color: #0e0f12; border-color: var(--accent);
  }
  .topbar .burndown.on:hover { background: #8fb8ff; border-color: #8fb8ff; }
  .topbar .burndown:disabled { opacity: 0.35; cursor: not-allowed; background: transparent; color: var(--muted); border-color: var(--border-soft); }
  /* ---------- Sidebar ---------- */
  .rail {
    background: var(--bg-rail);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px 6px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .rail::-webkit-scrollbar { width: 6px; }
  .rail::-webkit-scrollbar-thumb { background: #2a2d34; border-radius: 3px; }
  .rail .empty {
    padding: 12px 8px; color: var(--muted); font-size: 11px; text-align: center;
  }
  .chip {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 9px;
    background: var(--bg-chip);
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    transition: background 100ms ease, border-color 100ms ease;
  }
  .chip:hover { background: var(--bg-chip-hov); }
  .chip.active {
    background: var(--bg-chip-act);
    border-color: var(--border-top);
  }
  .chip .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dead); flex-shrink: 0;
  }
  /* Three-state activity dot:
     - .dead       → offline (red)
     - .live.busy  → live + agent processing a turn (amber)
     - .live       → live + agent idle (green, default for live) */
  .chip.live .live-dot { background: var(--success); }
  .chip.live.busy .live-dot { background: var(--warn); }
  .chip.dead .live-dot { background: var(--danger); }
  .chip .label {
    flex: 1; min-width: 0;
    font-size: 12px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .chip.dead .label { color: var(--text-soft); }
  .chip .badge {
    font-size: 10px; font-weight: 600;
    background: #2a2d34; color: var(--text);
    padding: 1px 6px; border-radius: 8px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .chip.active .badge { background: var(--accent); color: #0e0f12; }
  .area-label {
    margin: 10px 8px 4px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .feature-chip {
    margin-left: 8px;
  }
  .feature-chip .label small {
    display: block;
    margin-top: 1px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 400;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ---------- Main ---------- */
  .main {
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .add-row {
    display: flex; gap: 6px; align-items: flex-start;
    padding: 10px 12px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
  }
  .add-row textarea {
    flex: 1; min-width: 0;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 9px;
    color: var(--text); font: inherit;
    line-height: 1.45;
    resize: none; overflow-y: auto;
    /* 1 line default, grows to ~3; JS sets explicit height. */
    height: 33px;
    max-height: 92px;
    transition: border-color 120ms ease;
  }
  .add-row textarea:focus { outline: none; border-color: var(--accent); }
  .add-row textarea::placeholder { color: var(--muted); }
  .add-row textarea:disabled { opacity: 0.5; }
  .add-row .add-btn {
    background: var(--accent); color: #0e0f12;
    border: none; border-radius: 6px;
    padding: 0 14px; font-weight: 600; font-size: 12px;
    align-self: stretch;
    min-height: 33px;
    transition: background 120ms ease, transform 80ms ease;
  }
  .add-row .add-btn:hover { background: #88baff; }
  .add-row .add-btn:active { transform: scale(0.97); }
  .add-row .add-btn:disabled {
    background: #2a2d34; color: var(--muted);
    cursor: not-allowed; transform: none;
  }

  .list {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 10px 12px 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .list::-webkit-scrollbar { width: 8px; }
  .list::-webkit-scrollbar-thumb { background: #2a2d34; border-radius: 4px; }
  .list .empty {
    margin: auto; padding: 40px 0;
    text-align: center; color: var(--muted); font-size: 12px;
  }

  /* ---------- Card (item) ---------- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    transition: background 120ms ease, border-color 120ms ease,
                opacity 200ms ease, transform 120ms ease;
    position: relative;
  }
  .card:hover { background: var(--bg-card-hov); border-color: var(--border-soft); }
  .card.top { background: var(--bg-top); border-color: var(--border-top); }
  .card.top:hover { background: var(--bg-top-hov); }
  .card .title-row {
    display: flex; align-items: flex-start; gap: 8px;
    cursor: pointer;
  }
  .card .title {
    flex: 1; min-width: 0;
    font-size: 13px; color: var(--text); font-weight: 500;
    word-wrap: break-word; overflow-wrap: anywhere;
    user-select: none;
  }
  .card .engage-hint {
    font-size: 9px; letter-spacing: 0.08em;
    color: var(--muted); text-transform: uppercase;
    opacity: 0; transition: opacity 120ms ease;
    align-self: center; flex-shrink: 0;
  }
  .card:hover .engage-hint { opacity: 0.7; }

  .card .meta {
    margin-top: 5px;
    font-size: 10px; color: var(--muted);
    display: flex; gap: 9px; align-items: center;
    font-variant-numeric: tabular-nums;
  }
  .card .meta .pos {
    background: #2a2d34; color: var(--text);
    padding: 1px 6px; border-radius: 8px;
    font-weight: 600; font-size: 9px;
  }
  .card.top .meta .pos { background: var(--accent); color: #0e0f12; }
  .card .meta .id {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1; min-width: 0;
  }
  .card .session {
    color: var(--text-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 170px;
  }
  .card .context {
    margin-top: 6px;
    padding: 6px 8px;
    border: 1px solid #3a2a12;
    border-radius: 5px;
    color: var(--text-soft);
    background: rgba(58, 42, 18, 0.25);
    font-size: 10px;
    overflow-wrap: anywhere;
  }

  .actions {
    display: flex; gap: 2px;
    margin-top: 7px;
    opacity: 0; max-height: 0; overflow: hidden;
    transition: opacity 140ms ease, max-height 200ms ease;
  }
  .card:hover .actions, .card:focus-within .actions { opacity: 1; max-height: 36px; }
  .actions button {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 3px 7px;
    color: var(--text-soft); font-size: 12px; line-height: 1;
    transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
  }
  .actions button:hover { background: #2a2d34; border-color: var(--border-soft); color: var(--text); }
  .actions button:disabled { opacity: 0.3; cursor: not-allowed; background: transparent; border-color: transparent; }
  .actions .spacer { flex: 1; }
  .actions .danger:hover { background: var(--danger-soft); border-color: #5a2828; color: var(--danger); }

  .card.editing .title-row { cursor: default; }
  .card.editing .engage-hint { display: none; }
  .card.editing .actions { opacity: 1; max-height: 36px; }
  .card .title-input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 5px 7px;
    color: var(--text); font: inherit; font-weight: 500;
    line-height: 1.45;
    resize: none; overflow-y: auto;
    /* 1 line default, grows to ~3; JS sets explicit height. */
    height: 28px;
    max-height: 70px;
  }
  .card .title-input:focus { outline: none; }

  .card.engaging { opacity: 0.55; pointer-events: none; }
  .card.engaging::after {
    content: "engaging…";
    position: absolute; right: 11px; top: 9px;
    font-size: 10px; color: var(--accent);
  }

  .partition-empty {
    margin: auto; padding: 40px 0;
    text-align: center; color: var(--muted); font-size: 12px;
  }

  .toast {
    position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    background: var(--accent); color: #0e0f12;
    padding: 7px 14px; border-radius: 14px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    opacity: 0; transition: opacity 180ms ease;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; }
  .toast.bad { background: var(--danger); color: #fff; }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <span class="title">Backlog</span>
      <span class="right">
        <span class="runtime" id="runtime" title="Runtime not loaded">runtime unknown</span>
        <span class="status" id="status"><span class="dot"></span>connecting…</span>
        <button type="button" class="burndown" id="burndown" title="Burndown mode: auto-engage the next item whenever one is marked done" aria-label="Toggle burndown" aria-pressed="false" disabled>🔥 Burndown</button>
        <button type="button" class="refresh" id="refresh" title="Reload viewer (picks up viewer.html changes)" aria-label="Refresh">↻</button>
      </span>
    </div>
    <div class="rail" id="rail"><div class="empty">no sessions</div></div>
    <div class="main">
      <form class="add-row" id="add-form" autocomplete="off">
        <textarea id="add-input" placeholder="Add an item…" maxlength="500" rows="1" disabled></textarea>
        <button type="submit" class="add-btn" id="add-btn" disabled>Add</button>
      </form>
      <div class="list" id="list">
        <div class="partition-empty">select a session</div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
(() => {
const params = new URLSearchParams(location.search);
const TOKEN = params.get("token") || "";

const status = document.getElementById("status");
const runtimeEl = document.getElementById("runtime");
const rail = document.getElementById("rail");
const list = document.getElementById("list");
const toast = document.getElementById("toast");
const addForm = document.getElementById("add-form");
const addInput = document.getElementById("add-input");
const addBtn = document.getElementById("add-btn");
const refreshBtn = document.getElementById("refresh");
const burndownBtn = document.getElementById("burndown");

refreshBtn.addEventListener("click", async () => {
  try {
    await fetch("/api/reload-viewer?token=" + encodeURIComponent(TOKEN), { method: "POST" });
  } catch (e) { console.error("reload-viewer failed", e); }
  intentionalClose = true;
  location.reload();
});

burndownBtn.addEventListener("click", async () => {
  const session = (snapshot.sessions || []).find((entry) => entry.id === addSessionId);
  if (!session || !session.live) return;
  const next = !session.burndown;
  try {
    await api("/api/burndown", { sessionId: session.id, enabled: next });
    showToast(next ? "burndown on — auto-engaging items" : "burndown off");
  } catch (e) { console.error(e); showToast("burndown toggle failed", true); }
});

let intentionalClose = false;
let snapshot = { sessions: [], queues: [], activeSessionId: null };
let activeQueueId = null;
let addSessionId = null;

function setStatus(label, cls) {
  status.className = "status " + (cls || "");
  status.innerHTML = '<span class="dot"></span>' + label;
}

function renderRuntime() {
  const runtime = snapshot.runtime || {};
  const version = runtime.version || "unknown";
  const commit = runtime.commit || "unknown";
  const cascade = runtime.itemContextCascade === false ? "cascade missing" : "cascade ok";
  runtimeEl.textContent = `v${version} · ${commit} · ${cascade}`;
  runtimeEl.title = [
    `Version: ${version}`,
    `Commit: ${commit}`,
    `Cascade: ${cascade}`,
    `Extension: ${runtime.extensionPath || "unknown"}`,
    `Package: ${runtime.packagePath || "unknown"}`,
  ].join("\n");
}

function showToast(msg, bad) {
  toast.textContent = msg;
  toast.classList.toggle("bad", !!bad);
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove("show"), 1300);
}

function relAge(iso) {
  if (!iso) return "";
  const t = Date.parse(iso.replace(" ", "T") + (iso.endsWith("Z") ? "" : "Z"));
  if (isNaN(t)) return "";
  const s = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}

async function api(path, body) {
  const res = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ...body, token: TOKEN }),
  });
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error("HTTP " + res.status + (text ? ": " + text : ""));
  }
  return res.json().catch(() => ({}));
}

function autoGrow(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, parseFloat(getComputedStyle(el).maxHeight)) + "px";
}

function getSelectedQueue() {
  return (snapshot.queues || []).find((queue) => queue.id === activeQueueId) || (snapshot.queues || [])[0] || null;
}

function getAddSession() {
  const sessions = snapshot.sessions || [];
  if (addSessionId && sessions.some((session) => session.id === addSessionId && session.live)) {
    return sessions.find((session) => session.id === addSessionId);
  }
  const selectedQueue = getSelectedQueue();
  const liveItemSessionId = selectedQueue?.items.find((item) => item.session_live)?.session_id;
  const target = liveItemSessionId
    ? sessions.find((session) => session.id === liveItemSessionId)
    : sessions.find((session) => session.id === snapshot.activeSessionId && session.live) || sessions.find((session) => session.live);
  addSessionId = target?.id || null;
  return target || null;
}

addInput.addEventListener("input", () => {
  addBtn.disabled = !getAddSession() || addInput.value.trim().length === 0;
  autoGrow(addInput);
});

addInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!addBtn.disabled) addForm.requestSubmit();
  }
});

addForm.addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const desc = addInput.value.trim();
  const addSession = getAddSession();
  const selectedQueue = getSelectedQueue();
  if (!desc || !addSession || !selectedQueue) return;
  addBtn.disabled = true; addInput.disabled = true;
  try {
    await api("/api/mutate", { op: "add", sessionId: addSession.id, description: desc, queueId: selectedQueue.id });
    addInput.value = "";
    showToast("added");
  } catch (e) {
    console.error(e); showToast("add failed", true);
  } finally {
    const target = getAddSession();
    addInput.disabled = !target;
    addBtn.disabled = !target || addInput.value.trim().length === 0;
    autoGrow(addInput);
    addInput.focus();
  }
});

function renderRail() {
  const queues = snapshot.queues || [];
  rail.innerHTML = "";
  if (queues.length === 0) {
    rail.innerHTML = '<div class="empty">no queues</div>';
    return;
  }
  queues.forEach((queue) => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "chip" + (queue.id === activeQueueId ? " active" : "");
    chip.title = queue.name + " · " + queue.itemCount + " item" + (queue.itemCount === 1 ? "" : "s");
    chip.innerHTML = `<span class="label">${queue.name}</span><span class="badge">${queue.itemCount || 0}</span>`;
    chip.addEventListener("click", () => { activeQueueId = queue.id; renderAll(); });
    rail.appendChild(chip);
  });
}

function renderMain() {
  const queue = getSelectedQueue();
  const addSession = getAddSession();
  if (!queue) {
    list.innerHTML = '<div class="partition-empty">select a queue</div>';
    addInput.disabled = true; addBtn.disabled = true;
    return;
  }
  addInput.disabled = !addSession;
  addBtn.disabled = !addSession || addInput.value.trim().length === 0;
  addInput.placeholder = addSession ? `Add to ${queue.name}…` : "No live session available…";

  const items = queue.items || [];
  if (items.length === 0) {
    list.innerHTML = '<div class="partition-empty">no items in this queue</div>';
    return;
  }
  list.innerHTML = "";
  items.forEach((item) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.id = item.id;

    const titleRow = document.createElement("div");
    titleRow.className = "title-row";
    const titleEl = document.createElement("div");
    titleEl.className = "title";
    titleEl.textContent = item.description;
    const hint = document.createElement("span");
    hint.className = "engage-hint";
    hint.textContent = "click to engage";
    titleRow.append(titleEl, hint);

    const meta = document.createElement("div");
    meta.className = "meta";
    const posEl = document.createElement("span");
    posEl.className = "pos";
    posEl.textContent = "#" + item.position;
    const idEl = document.createElement("span");
    idEl.className = "id";
    idEl.textContent = item.id;
    const sessionEl = document.createElement("span");
    sessionEl.className = "session";
    sessionEl.textContent = item.session_label || item.session_id;
    const ageEl = document.createElement("span");
    ageEl.className = "age";
    ageEl.textContent = relAge(item.created_at);
    meta.append(posEl, idEl, sessionEl, ageEl);

    const contextEl = document.createElement("div");
    contextEl.className = "context";
    if (item.por_context_summary) {
      contextEl.textContent = item.por_context_summary;
      contextEl.style.display = "block";
    } else {
      contextEl.style.display = "none";
    }

    const actions = document.createElement("div");
    actions.className = "actions";
    actions.addEventListener("click", (e) => e.stopPropagation());
    const upBtn = mkAction("↑", "Move up", () => mutate({ op: "up", sessionId: item.session_id, id: item.id, queueId: queue.id }, "moved up"));
    const downBtn = mkAction("↓", "Move down", () => mutate({ op: "down", sessionId: item.session_id, id: item.id, queueId: queue.id }, "moved down"));
    const editBtn = mkAction("✎", "Edit", () => beginEdit(card, titleEl, item, queue.id));
    const spacer = document.createElement("span");
    spacer.className = "spacer";
    const delBtn = mkAction("✕", "Delete", () => mutate({ op: "delete", sessionId: item.session_id, id: item.id, queueId: queue.id }, "deleted"));
    delBtn.classList.add("danger");
    actions.append(upBtn, downBtn, editBtn, spacer, delBtn);

    card.append(titleRow, meta, contextEl, actions);
    titleRow.addEventListener("click", () => {
      if (!item.session_live) { showToast("session is offline", true); return; }
      engage(card, item.session_id, item);
    });
    list.appendChild(card);
  });
}

function renderAll() {
  if (!activeQueueId && (snapshot.queues || []).length > 0) {
    activeQueueId = snapshot.queues[0].id;
  }
  const sessions = snapshot.sessions || [];
  if (!addSessionId || !sessions.find((session) => session.id === addSessionId && session.live)) {
    addSessionId = snapshot.activeSessionId || sessions.find((session) => session.live)?.id || null;
  }
  const total = sessions.reduce((count, session) => count + session.items.length, 0);
  setStatus(total + (total === 1 ? " item" : " items") + " · " + sessions.length + " session" + (sessions.length === 1 ? "" : "s"), status.classList.contains("bad") ? "bad" : "live");
  renderRail();
  renderMain();
  renderBurndown();
  renderRuntime();
}

function renderBurndown() {
  const session = getAddSession();
  const enabled = !!session?.burndown;
  const live = !!session?.live;
  burndownBtn.classList.toggle("on", enabled);
  burndownBtn.setAttribute("aria-pressed", enabled ? "true" : "false");
  burndownBtn.disabled = !live;
  burndownBtn.textContent = enabled ? "🔥 Burndown ON" : "🔥 Burndown";
}

function mkAction(glyph, title, onClick) {
  const b = document.createElement("button");
  b.type = "button"; b.textContent = glyph; b.title = title;
  b.setAttribute("aria-label", title);
  b.addEventListener("click", onClick);
  return b;
}

async function mutate(body, successMsg) {
  try {
    await api("/api/mutate", body);
    if (successMsg) showToast(successMsg);
  } catch (e) {
    console.error(e); showToast("action failed", true);
  }
}

function beginEdit(card, titleEl, item, queueId) {
  const input = document.createElement("textarea");
  input.className = "title-input";
  input.rows = 1;
  input.value = item.description;
  input.maxLength = 500;
  titleEl.replaceWith(input);
  card.classList.add("editing");
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  autoGrow(input);
  input.addEventListener("input", () => autoGrow(input));
  let done = false;
  const finish = async (commit) => {
    if (done) return;
    done = true;
    const newDesc = input.value.trim();
    try {
      if (commit && newDesc && newDesc !== item.description) {
        await mutate({ op: "edit", sessionId: item.session_id, id: item.id, description: newDesc, queueId }, "edited");
        titleEl.textContent = newDesc;
      }
    } finally {
      input.replaceWith(titleEl);
      card.classList.remove("editing");
    }
  };
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); finish(true); }
    else if (e.key === "Escape") { e.preventDefault(); finish(false); }
  });
  input.addEventListener("blur", () => finish(true));
}

async function engage(card, sid, item) {
  card.classList.add("engaging");
  showToast("engaging " + item.id);
  try {
    await api("/api/engage", { sessionId: sid, id: item.id });
  } catch (e) {
    console.error(e);
    const isOffline = /409|503/.test(e.message || "");
    showToast(isOffline ? "session is offline" : "engage failed", true);
    card.classList.remove("engaging");
  }
}

async function loadInitial() {
  try {
    const res = await fetch("/api/snapshot?token=" + encodeURIComponent(TOKEN));
    if (!res.ok) throw new Error("HTTP " + res.status);
    snapshot = await res.json();
    renderAll();
  } catch (e) {
    console.error("initial load failed", e);
    setStatus("load failed", "bad");
  }
}

let ws = null, reconnectMs = 500;
function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(proto + "//" + location.host + "/ws?token=" + encodeURIComponent(TOKEN));
  ws.onopen = () => { reconnectMs = 500; renderAll(); };
  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === "snapshot") { snapshot = msg; renderAll(); }
      else if (msg.type === "close") { intentionalClose = true; window.close(); }
    } catch (e) { console.error("ws parse", e); }
  };
  ws.onclose = () => {
    if (intentionalClose) return;
    setStatus("reconnecting…", "bad");
    setTimeout(connect, reconnectMs);
    reconnectMs = Math.min(reconnectMs * 2, 5000);
  };
  ws.onerror = () => { try { ws.close(); } catch {} };
}

loadInitial().then(connect);
})();
</script>
</body>
